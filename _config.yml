title: "My Professional Portfolio"
description: "Showcasing my AI, DevOps, Cloud, Automation, and Web projects"
remote_theme: "mmistakes/minimal-mistakes"
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate
permalink: /:categories/:title/
collections:
  projects:
    output: true
defaults:
  -
    scope:
      path: ""
      type: "projects"
    values:
      layout: "single-project"
